<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - CodeAlpha Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <h1>CodeAlpha Store</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
                <a href="cart.html">Cart (<span id="cart-count">1</span>)</a>
            </nav>
        </div>

    <main>
        <h2>Your Shopping Cart</h2>
        
        <div style="max-width: 600px; margin: 0 auto; text-align: left; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
            
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px;">

            <h3 style="text-align: right; margin-top: 20px;">Total: $25.00</h3>
            
            <button style="background-color: #34a853; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; margin-top: 15px; cursor: pointer; font-weight: bold;">
                Proceed to Checkout
            </button>
        </div>
    </main>
