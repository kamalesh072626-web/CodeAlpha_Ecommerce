<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CodeAlpha Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="sticky-header">
        <div class="navbar">
            <h1>CodeAlpha Store</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
                <a href="cart.html" class="cart-link">Cart (<span id="cart-count">0</span>)</a>
            </nav>
        </div>
    </header>

    <main class="auth-section">
        <div class="auth-card">
            <h2>Create Account</h2>
            <form class="auth-form" id="signup-form">
                <input type="text" id="signup-name" placeholder="Full Name" required>
                <input type="email" id="signup-email" placeholder="Email Address" required>
                <input type="password" id="signup-password" placeholder="Password (min 6 characters)" required minlength="6">
                <button type="submit">Sign Up</button>
            </form>
            <p>Already have an account? <a href="login.html">Sign in here</a></p>
        </div>
    </main>
    <script src="js/auth.js"></script>
</body>
</html>
